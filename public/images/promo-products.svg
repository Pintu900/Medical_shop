<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f0fdf4"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="bag" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#166534"/>
      <stop offset="1" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="bottle1" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#fff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#14532d" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Surface -->
  <ellipse cx="400" cy="520" rx="320" ry="28" fill="#14532d" opacity="0.08"/>

  <!-- Medicine bottle 1 -->
  <g filter="url(#shadow)">
    <rect x="120" y="180" width="90" height="280" rx="12" fill="url(#bottle1)" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="145" y="150" width="40" height="40" rx="8" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="120" y="260" width="90" height="70" rx="4" fill="#166534"/>
    <text x="165" y="295" text-anchor="middle" fill="#fff" font-family="Poppins, Arial, sans-serif" font-size="11" font-weight="700">MED</text>
    <text x="165" y="312" text-anchor="middle" fill="#bbf7d0" font-family="Poppins, Arial, sans-serif" font-size="9">500mg</text>
  </g>

  <!-- Medicine bottle 2 -->
  <g filter="url(#shadow)">
    <rect x="230" y="220" width="70" height="240" rx="10" fill="url(#bottle1)" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="248" y="198" width="34" height="32" rx="6" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="230" y="290" width="70" height="55" rx="4" fill="#0284c7"/>
    <text x="265" y="322" text-anchor="middle" fill="#fff" font-family="Poppins, Arial, sans-serif" font-size="9" font-weight="700">VIT-C</text>
  </g>

  <!-- Blister pack -->
  <g filter="url(#shadow)" transform="translate(330, 340)">
    <rect x="0" y="0" width="160" height="110" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="12" y="12" width="136" height="86" rx="6" fill="#f8fafc"/>
    <g fill="#166534" opacity="0.85">
      <circle cx="32" cy="32" r="10"/><circle cx="58" cy="32" r="10"/><circle cx="84" cy="32" r="10"/><circle cx="110" cy="32" r="10"/>
      <circle cx="32" cy="58" r="10"/><circle cx="58" cy="58" r="10"/><circle cx="84" cy="58" r="10"/><circle cx="110" cy="58" r="10"/>
      <circle cx="32" cy="84" r="10"/><circle cx="58" cy="84" r="10"/><circle cx="84" cy="84" r="10"/><circle cx="110" cy="84" r="10"/>
    </g>
  </g>

  <!-- Small bottle -->
  <g filter="url(#shadow)">
    <rect x="520" y="280" width="56" height="180" rx="8" fill="url(#bottle1)" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="532" y="262" width="32" height="26" rx="5" fill="#e2e8f0"/>
    <rect x="520" y="340" width="56" height="40" rx="3" fill="#9333ea"/>
  </g>

  <!-- Shopping bag -->
  <g filter="url(#shadow)">
    <path d="M560 120h180l-24 340H584L560 120z" fill="url(#bag)"/>
    <path d="M610 120c0-36 28-56 40-56s40 20 40 56" stroke="#bbf7d0" stroke-width="8" fill="none" stroke-linecap="round"/>
    <rect x="560" y="120" width="180" height="24" fill="#fff" opacity="0.08"/>

    <!-- Logo on bag -->
    <circle cx="650" cy="220" r="36" fill="#fff" opacity="0.15"/>
    <path d="M650 198v44M628 220h44" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
    <rect x="638" y="212" width="24" height="16" rx="6" fill="#38bdf8"/>

    <text x="650" y="290" text-anchor="middle" fill="#fff" font-family="Poppins, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.5">NEW SHIVAM</text>
    <text x="650" y="310" text-anchor="middle" fill="#bbf7d0" font-family="Poppins, Arial, sans-serif" font-size="11" font-weight="600">MEDICOS</text>
  </g>

  <!-- Scattered pills -->
  <ellipse cx="310" cy="500" rx="14" ry="8" fill="#fff" stroke="#166534" stroke-width="2"/>
  <ellipse cx="340" cy="515" rx="14" ry="8" fill="#166534"/>
  <ellipse cx="420" cy="505" rx="14" ry="8" fill="#fff" stroke="#0284c7" stroke-width="2"/>
  <ellipse cx="450" cy="518" rx="14" ry="8" fill="#0284c7"/>
</svg>
